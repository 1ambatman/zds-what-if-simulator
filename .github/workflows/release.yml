name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Releases
      packages: write   # push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Build the user-facing release zip ─────────────────────────────────
      - name: Assemble release zip
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          IMG="ghcr.io/${REPO}:${TAG}"
          mkdir -p dist

          # docker-compose.yml pinned to this exact release tag
          cat > dist/docker-compose.yml << YAML
services:
  app:
    image: ${IMG}
    ports:
      - "8765:8765"
    environment:
      APP_HOST: "0.0.0.0"
    volumes:
      - ./.env:/app/.env:ro
    restart: unless-stopped
YAML

          cp launch.command dist/
          cp launch.bat     dist/
          cp .env.example   dist/

          chmod +x dist/launch.command

          # Compact quickstart README for the zip
          cat > dist/README.md << 'MD'
# ZDS What If Simulator — Quick Start

## Prerequisites
- [Docker Desktop](https://www.docker.com/products/docker-desktop/) installed and running

## Setup (one time)
1. Rename `.env.example` → `.env`
2. Open `.env` in any text editor and fill in:
   - `DATABRICKS_HOST` — your workspace URL
   - `DATABRICKS_WAREHOUSE_ID` — SQL warehouse ID (from Compute → SQL Warehouses)
   - `DATABRICKS_TOKEN` — personal access token (Settings → Developer → Access Tokens)
   - `MLFLOW_RUN_ID` — the MLflow run ID of the model you want to load

## Run
- **Mac:** double-click `launch.command`
- **Windows:** double-click `launch.bat`

The app opens automatically in your browser at **http://localhost:8765**.

## Stop
Run `docker compose down` in this folder, or quit Docker Desktop.
MD

          ZIP="zds-what-if-simulator-${TAG}.zip"
          cd dist && zip -r "../${ZIP}" . && cd ..
          echo "ZIP=${ZIP}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ZIP }}
          body: |
            ## How to install

            1. Install **[Docker Desktop](https://www.docker.com/products/docker-desktop/)** (one-time)
            2. Download **`${{ env.ZIP }}`** below and extract it anywhere
            3. Rename `.env.example` → `.env` and fill in your Databricks credentials
            4. **Mac:** double-click `launch.command` · **Windows:** double-click `launch.bat`

            The app opens automatically at **http://localhost:8765**.

            To stop: run `docker compose down` in the extracted folder, or quit Docker Desktop.
